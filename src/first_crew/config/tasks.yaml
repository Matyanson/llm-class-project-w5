research_task:
  description: >
    Retrieve and analyze the profile for user {user_id} and the features for item {item_id}.
    Look at the historical reviews to understand the user's tone and the item's typical feedback.
    Synthesize a persona for the user and a profile for the item.
  expected_output: "A detailed summary of the user's preferences and the item's attributes."
  agent: researcher

reporting_task:
  description: >
    Using the research provided, predict the star rating (1.0 to 5.0) this user would give this item.
    Write a realistic review text that matches the user's style.
    Your response MUST be in valid JSON format.
  expected_output: 'A JSON object: {"stars": 4.5, "review": "The mock review text here..."}'
  agent: reporting_analyst